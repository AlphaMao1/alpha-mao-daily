name: Alpha Mao Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *"

permissions:
  contents: write

jobs:
  collect-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GITHUB_TOKEN: ${{ github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
      YOUTUBE_PROXY_URL: ${{ secrets.YOUTUBE_PROXY_URL }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run collector
        run: python src/collector.py

      - name: Generate report if OpenAI key is configured
        run: |
          python src/generate_report.py || echo "Report generation failed; continuing to commit collector outputs."

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          if git diff --cached --quiet; then
            echo "No generated artifact changes to commit."
          else
            git commit -m "Update Alpha Mao daily artifacts"
            git push
          fi
